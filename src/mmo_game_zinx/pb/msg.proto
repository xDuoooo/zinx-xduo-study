syntax = "proto3";            //指定版本信息，不指定会报错
package pb;            //后期生成go文件的包名
option go_package = "zinx-xduo-study/src/mmo_game_zinx/pb;pb";
option csharp_namespace = "Pb";
message SyncPid{
  int32 Pid = 1;
}
message Talk{
  string Content = 1;
}
message Position{
  float X = 1;
  float Y = 2;
  float Z = 3;
  float V = 4;
}
message BroadCast{
  int32 Pid = 1;
  int32 Tp = 2;
  oneof Data {
    string Content = 3;
    Position P = 4;
    int32 ActionData = 5;
  }
}
message SyncPlayers{
  repeated Player ps = 1;
}

message Player{
  int32 Pid = 1;
  Position P = 2;
}